name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build release archive
        id: package
        run: python scripts/package_release.py --output-dir dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: v${{ steps.package.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package.outputs.archive_path }}
          generate_release_notes: true
